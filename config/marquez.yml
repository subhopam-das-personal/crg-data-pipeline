server:
  applicationConnectors:
    - type: http
      port: ${MARQUEZ_PORT:-5000}
  adminConnectors:
    - type: http
      port: ${MARQUEZ_ADMIN_PORT:-5001}

db:
  driverClass: org.postgresql.Driver
  url: jdbc:postgresql://${MARQUEZ_DB_HOST:-localhost}:${MARQUEZ_DB_PORT:-5432}/${MARQUEZ_DB_NAME:-marquez}?currentSchema=marquez
  user: ${MARQUEZ_DB_USER:-marquez}
  password: ${MARQUEZ_DB_PASSWORD:-marquez}
  maxSize: 8
  minSize: 2
  initialSize: 2

logging:
  level: INFO
  appenders:
    - type: console
