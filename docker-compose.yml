services:
  marquez:
    build:
      context: .
      dockerfile: Dockerfile.marquez
    ports:
      - "5000:5000"   # OpenLineage API  (app → Marquez)
      - "3000:3000"   # Marquez Web UI   (browser)
    environment:
      - MARQUEZ_DB_HOST=${MARQUEZ_DB_HOST}
      - MARQUEZ_DB_PORT=${MARQUEZ_DB_PORT:-5432}
      - MARQUEZ_DB_USER=${MARQUEZ_DB_USER}
      - MARQUEZ_DB_PASSWORD=${MARQUEZ_DB_PASSWORD}
      - MARQUEZ_DB_NAME=${MARQUEZ_DB_NAME}
      - MARQUEZ_PORT=5000
      - MARQUEZ_ADMIN_PORT=5001
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5000/api/v1/namespaces"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 90s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    environment:
      - OPENLINEAGE_URL=http://marquez:5000
      - MARQUEZ_UI_URL=http://localhost:3000
    depends_on:
      marquez:
        condition: service_healthy
    volumes:
      - ./data:/app/data
